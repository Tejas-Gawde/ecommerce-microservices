services:
  # PostgreSQL - Catalog Service Database
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: CatalogDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # PostgreSQL - Inventory Service Database
  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: InventoryDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Redis - Shared Cache for all services
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # RabbitMQ - Shared Message Broker for all services
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ecommerce-network

  # Seq - Centralized Logging for all services
  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: Y
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - ecommerce-network

  # Catalog Service Application
  catalog-service:
    image: catalog-service:latest
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__CatalogDB=Host=catalog-db;Port=5432;Database=CatalogDb;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=host=rabbitmq;username=guest;password=guest
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80
    ports:
      - "5000:8080"
    depends_on:
      catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

  # Inventory Service Application
  inventory-service:
    image: inventory-service:latest
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__InventoryDb=Host=localhost;Port=5433;Database=InventoryDb;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=host=rabbitmq;username=guest;password=guest
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80
    ports:
      - "5002:8080"
    depends_on:
      inventory-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

      # PostgreSQL - Orders Service
  orders-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: OrdersDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  # Orders Service
  orders-service:
    image: orders-service:latest
    build:
      context: .
      dockerfile: OrdersService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OrdersDb=Host=orders-db;Port=5432;Database=OrdersDb;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=host=rabbitmq;username=guest;password=guest
      - Serilog__WriteTo__1__Args__serverUrl=http://seq:80
    ports:
      - "5004:8080"
    depends_on:
      orders-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - ecommerce-network
    restart: unless-stopped

volumes:
  catalog-db-data:
  inventory-db-data:
  redis-data:
  rabbitmq-data:
  seq-data:
  orders-db-data:

networks:
  ecommerce-network:
    driver: bridge